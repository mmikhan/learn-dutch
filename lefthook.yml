pre-commit:
  parallel: true
  jobs:
    - name: lint
      file_types: not executable
      stage_fixed: true
      run: bunx eslint {staged_files} --fix

    - name: format
      file_types: not executable
      stage_fixed: true
      run: bunx prettier {staged_files} --write

    - name: typstyle
      glob: "*.typ"
      stage_fixed: true
      run: typstyle -iv {staged_files}

# Build commit messages
prepare-commit-msg:
  commands:
    commitzen:
      interactive: true
      run: '[ "{2}" = "commit" ] && exit 0; bun run cz --hook # Or npx cz --hook'
      env:
        LEFTHOOK: "0"

# Validate commit messages
commit-msg:
  commands:
    "lint commit message":
      run: bun run commitlint --edit {1}
