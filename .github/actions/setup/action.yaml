name: "Setup and install"
description: "Set up Bun and install dependencies"

runs:
  using: "composite"
  steps:
    - name: "Set up Bun"
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: "package.json" # or ".tool-versions" or ".bun-version"

    - name: "Install dependencies"
      shell: bash
      run: bun install
