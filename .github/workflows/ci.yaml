name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Setup and install"
        uses: ./.github/actions/setup

      - name: "Run linters"
        run: bun run lint

      - name: "Check Typst formatting"
        run: typstyle --check -v main.typ chapters/ frontmatter/

      - name: "Format code"
        run: bunx --bun prettier . --check
