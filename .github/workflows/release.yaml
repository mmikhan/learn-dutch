name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Release without publishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  release:
    runs-on: ubuntu-latest
    name: "Bump version, compile PDF, and create release"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Typst
        uses: typst-community/setup-typst@v5

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: ${{ inputs.dry_run || env.ACT }}
          changelog_increment_filename: body.md

      - name: Compile PDF
        if: ${{ !inputs.dry_run && !env.ACT }}
        shell: bash
        run: |
          mkdir -p dist
          asset="dist/learn-dutch-${REVISION}.pdf"
          typst compile main.typ "$asset"
          echo "RELEASE_ASSET=$asset" >> "$GITHUB_ENV"

      - name: Dry run summary
        if: ${{ inputs.dry_run || env.ACT }}
        run: |
          echo "Dry run enabled."
          echo "Skipping version bump push and GitHub release creation."

      - name: Release
        if: ${{ !inputs.dry_run && !env.ACT }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.REVISION }}
          body_path: "body.md"
          files: ${{ env.RELEASE_ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
